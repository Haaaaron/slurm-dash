name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app
      - run: cargo build --manifest-path app/Cargo.toml
      - run: cargo test --manifest-path app/Cargo.toml
      - run: cargo clippy --manifest-path app/Cargo.toml -- -D warnings
